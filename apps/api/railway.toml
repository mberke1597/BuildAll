# Railway Configuration
# Deploy each service separately in Railway dashboard

[build]
builder = "dockerfile"

[deploy]
startCommand = "sh -lc 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT}'"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
